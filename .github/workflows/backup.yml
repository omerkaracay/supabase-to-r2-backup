name: Supa-backup-to-R2
on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  schedule:
    - cron: '0 2 * * *' # Runs every day at 2:00 AM UTC

permissions:
  contents: read # Only needs to read the repo, no write access needed

jobs:
  run_db_backup:
    runs-on: ubuntu-latest
    env:
      supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
      # These environment variables are used by the AWS CLI to connect to R2
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create and compress backup
        id: compress_backup
        run: |
          # Create a temporary directory for the SQL files
          mkdir -p ./supabase_backups

          # Dump the database structure, roles, and data using the Session Pooler connection
          supabase db dump --db-url "$supabase_db_url" -f ./supabase_backups/roles.sql --role-only
          supabase db dump --db-url "$supabase_db_url" -f ./supabase_backups/schema.sql
          supabase db dump --db-url "$supabase_db_url" -f ./supabase_backups/data.sql --data-only --use-copy
          
          # Create a unique filename with the date
          FILE_NAME="backup-$(date +%Y-%m-%d).zip"
          
          # Compress the files into a single zip archive
          zip -r "${FILE_NAME}" ./supabase_backups
          
          # Make the filename available to other steps
          echo "file_name=${FILE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload to Cloudflare R2
        run: |
          # Use the AWS CLI to upload the file to your R2 bucket
          aws s3 cp \
            "${{ steps.compress_backup.outputs.file_name }}" \
            "s3://${{ secrets.CF_BUCKET_NAME }}/${{ steps.compress_backup.outputs.file_name }}" \
            --endpoint-url "${{ secrets.CF_BUCKET_ENDPOINT }}"
